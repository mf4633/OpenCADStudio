# Engine is std-only on purpose: dependency-light and WASM-friendly.
[dependencies]
quick-xml = { version = "0.37", default-features = false }

[lib]
name = "stormsewer"
crate-type = ["cdylib", "rlib"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"

